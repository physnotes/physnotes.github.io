name: Deploy Multiple Quarto Books to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TikZ/diagram dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            inkscape \
            ghostscript \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-pictures
            texlive-fonts-recommended \
            cm-super \
            fonts-lmodern

      - name: Check diagram dependencies
        run: |
          which pdflatex
          pdflatex --version
          kpsewhich tikz.sty
          kpsewhich standalone.cls
          fc-cache -fv
          fc-match "Computer Modern"
          fc-match "Latin Modern Roman"
          which inkscape
          inkscape --version

      - name: Render Quantum Mechanics Book
        run: |
          cd qm
          quarto render --to html --output-dir ../_deploy/qm

      - name: Render Landing Page
        run: |
          cd landing
          quarto render --to html --output-dir ../_deploy

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_deploy
