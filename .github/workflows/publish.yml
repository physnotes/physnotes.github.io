name: Deploy Multiple Quarto Books to gh-pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto with TinyTeX
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y inkscape ghostscript libx11-dev

      - name: Add TinyTeX to PATH
        run: |
          echo "Searching for tlmgr..."
          find "$HOME" -name tlmgr -type f

          TLMGR_DIR="$(dirname "$(find "$HOME" -name tlmgr -type f | head -n 1)")"
          echo "Found tlmgr in: $TLMGR_DIR"
          echo "$TLMGR_DIR" >> "$GITHUB_PATH"

      - name: Install TeX packages
        run: |
          tlmgr install standalone pgf xcolor preview

      - name: Check diagram dependencies
        run: |
          which tlmgr
          tlmgr --version
          which pdflatex
          pdflatex --version
          kpsewhich standalone.cls
          kpsewhich tikz.sty
          which inkscape
          inkscape --version
