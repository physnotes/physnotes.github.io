project:
  type: book


book:
  title: "Quantum Mechanics"
  author: 
  - name: Eric Du
    email: eric.du03@berkeley.edu
    affiliation: UC Berkeley
  - name: Andrew Binder
    email: abinder@berkeley.edu
    affiliation: UC Berkeley, Stony Brook University

  chapters:
    - index.qmd
    - part: part1/part1.qmd
      chapters: 
        - part1/origins.qmd
        - part1/formalism.qmd
        - part1/postulates.qmd 
        - part1/quantum-from-classical.qmd
        - part1/1d-wave-mechanics.qmd
    - references.qmd

  page-footer: "[Home](../)"


bibliography: references.bib


filters:
  - diagram

format:
  html:
    theme:
      - cosmo
      - brand
      - styles.scss
    include-after-body:
      - theorem-collapse.html
    html-math-method: mathjax
    include-in-header:
      - text: |
          <script>
            window.MathJax = {
              loader: { load: ['[tex]/physics'] },
              tex: {
                packages: {'[+]': ['physics']},
                physics: {
                  italicdiff: true
                }
              }
            };
            </script>         
          <link rel="stylesheet" type= "text/css" href="https://tikzjax.com/v1/fonts.css">
          <script src="https://tikzjax.com/v1/tikzjax.js"></script>
    grid:
      body-width: 1000px
    fontsize: 12pt

  pdf:
    documentclass: scrreprt
    include-in-header: 
      - boxed-theorems.tex
      - macros.tex


editor:
  render-on-save: true
